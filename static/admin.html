<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tips</title>
    <link rel="stylesheet" href="/static/bundle.min.css" />
    <link rel="stylesheet" href="/ext-assets/tips/app.css" />
  </head>
  <body data-theme="bitcoin" class="body--dark">
    <main class="shell q-pa-md" data-theme="bitcoin">
      <header class="row items-center justify-between q-mb-md q-gutter-md">
        <div class="row items-center q-gutter-sm">
          <img
            class="tips-icon"
            src="/ext-assets/tips/assets/icon.svg"
            alt=""
          />
          <div>
            <h1 class="text-h4 text-weight-bold q-my-none">Tips</h1>
            <p class="text-subtitle2 text-grey-5 q-my-none">
              Manage public Lightning tip jars.
            </p>
          </div>
        </div>
        <div
          class="runtime-status text-caption text-grey-5 rounded-borders"
          id="runtime-status"
        >
          wasm runtime
        </div>
      </header>

      <section class="row q-col-gutter-md">
        <div class="col-12 col-md-5">
          <div class="panel q-card q-card--dark q-pa-md full-height">
            <div class="row items-center justify-between q-mb-md">
              <h2 class="text-h6 text-weight-bold q-my-none">Create Jar</h2>
            </div>
            <form id="jar-form" class="form q-gutter-md">
              <label>
                <span class="text-caption text-grey-5">Title</span>
                <input
                  name="title"
                  value="Support the project"
                  maxlength="80"
                />
              </label>
              <label>
                <span class="text-caption text-grey-5">Description</span>
                <textarea name="description" maxlength="280">Leave a tip and a short message.</textarea>
              </label>
              <label>
                <span class="text-caption text-grey-5">Wallet reference</span>
                <input name="walletId" value="wallet_demo" maxlength="128" />
              </label>
              <label>
                <span class="text-caption text-grey-5">Suggested amounts</span>
                <input name="suggestedAmounts" value="100,500,1000" />
              </label>
              <label>
                <span class="text-caption text-grey-5">Thank you message</span>
                <input
                  name="thankYouMessage"
                  value="Thanks for the tip."
                  maxlength="160"
                />
              </label>
              <button class="q-btn bg-primary text-white full-width" type="submit">
                Create
              </button>
            </form>
          </div>
        </div>

        <div class="col-12 col-md-7">
          <div class="panel q-card q-card--dark q-pa-md full-height">
            <div class="row items-center justify-between q-mb-md">
              <h2 class="text-h6 text-weight-bold q-my-none">Jars</h2>
            </div>
            <div id="jar-list" class="jar-list"></div>
          </div>
        </div>
      </section>

      <section class="row q-col-gutter-md q-mt-md">
        <div class="col-12">
          <div class="panel q-card q-card--dark q-pa-md">
            <div class="row items-center justify-between q-mb-md">
              <h2 class="text-h6 text-weight-bold q-my-none">Result</h2>
            </div>
            <pre id="result">{}</pre>
          </div>
        </div>
      </section>
    </main>
    <script src="/ext-assets/tips/lnbits-extension-sdk.js"></script>
    <script src="/ext-assets/tips/admin.js"></script>
  </body>
</html>
