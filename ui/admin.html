<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tips</title>
    <link rel="stylesheet" href="/static/bundle.min.css" />
    <link rel="stylesheet" href="/ext-assets/tips/app.css" />
  </head>
  <body data-theme="bitcoin" class="body--dark">
    <main id="tips-admin-app" class="shell q-pa-md" data-theme="bitcoin" v-cloak>
      <header class="row items-center justify-between q-mb-md q-gutter-md">
        <div class="row items-center q-gutter-sm">
          <img
            class="tips-icon"
            src="/ext-assets/tips/assets/icon.png"
            alt=""
          />
          <div>
            <h1 class="text-h4 text-weight-bold q-my-none">Tips</h1>
            <p class="text-subtitle2 text-grey-5 q-my-none">
              Manage public Lightning tip jars.
            </p>
          </div>
        </div>
        <div class="runtime-status text-caption text-grey-5 rounded-borders">
          sandbox bridge
        </div>
      </header>

      <section class="row q-col-gutter-md">
        <div class="col-12 col-md-4">
          <q-card dark class="panel q-pa-md full-height">
            <div class="row items-center justify-between q-mb-md">
              <h2 class="text-h6 text-weight-bold q-my-none">Create Jar</h2>
            </div>
            <q-form class="q-gutter-md" @submit.prevent="createJar">
              <q-input
                v-model="form.title"
                dark
                filled
                dense
                label="Title"
                maxlength="80"
              ></q-input>
              <q-input
                v-model="form.description"
                dark
                filled
                dense
                label="Description"
                type="textarea"
                maxlength="280"
              ></q-input>
              <q-select
                v-model="form.walletId"
                dark
                filled
                dense
                emit-value
                map-options
                label="Wallet"
                :options="walletOptions"
                :disable="!walletOptions.length"
              ></q-select>
              <q-input
                v-model="form.suggestedAmounts"
                dark
                filled
                dense
                label="Suggested amounts"
              ></q-input>
              <q-input
                v-model="form.thankYouMessage"
                dark
                filled
                dense
                label="Thank you message"
                maxlength="160"
              ></q-input>
              <q-btn
                unelevated
                color="primary"
                class="full-width"
                type="submit"
                :disable="!walletOptions.length"
                :loading="creating"
              >
                Create
              </q-btn>
            </q-form>
          </q-card>
        </div>

        <div class="col-12 col-md-8">
          <q-card dark class="panel q-pa-md full-height">
            <q-table
              dark
              flat
              dense
              binary-state-sort
              row-key="id"
              :rows="jars"
              :columns="jarsTable.columns"
              v-model:pagination="jarsTable.pagination"
              :loading="jarsTable.loading"
              @request="fetchJars"
            >
              <template v-slot:top>
                <div class="row items-center justify-between full-width q-gutter-sm">
                  <h2 class="text-h6 text-weight-bold q-my-none">Jars</h2>
                  <q-input
                    v-model="jarsTable.search"
                    dark
                    filled
                    dense
                    clearable
                    debounce="300"
                    placeholder="Search jars"
                    class="jar-search"
                    @update:model-value="searchJars"
                  >
                    <template v-slot:prepend>
                      <q-icon name="search"></q-icon>
                    </template>
                  </q-input>
                </div>
              </template>

              <template v-slot:body-cell-publicUrl="props">
                <q-td :props="props">
                  <q-input
                    dark
                    dense
                    borderless
                    readonly
                    :model-value="publicJarUrl(props.row.id)"
                    input-class="text-caption"
                  ></q-input>
                </q-td>
              </template>

              <template v-slot:body-cell-actions="props">
                <q-td :props="props">
                  <q-btn
                    flat
                    dense
                    round
                    icon="content_copy"
                    @click="copyPublicUrl(publicJarUrl(props.row.id))"
                  >
                    <q-tooltip>Copy public link</q-tooltip>
                  </q-btn>
                </q-td>
              </template>
            </q-table>
          </q-card>
        </div>
      </section>

      <section class="row q-col-gutter-md q-mt-md">
        <div class="col-12">
          <q-card dark class="panel q-pa-md">
            <div class="row items-center justify-between q-mb-md">
              <h2 class="text-h6 text-weight-bold q-my-none">Result</h2>
            </div>
            <pre>{{ resultText }}</pre>
          </q-card>
        </div>
      </section>
    </main>
    <script src="/static/vendor/vue.global.prod.js"></script>
    <script src="/static/vendor/quasar.umd.prod.js"></script>
    <script src="/ext-assets/tips/lnbits-extension-sdk.js"></script>
    <script src="/ext-assets/tips/admin.js"></script>
  </body>
</html>
